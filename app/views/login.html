<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Secure Shop - Connexion</title>
        <link rel="stylesheet" href="/css/main.css" />
    </head>
    <body>
        <div id="topbar"></div>

        <main>
            <section class="hero">
                <div class="container">
                    <h1>Connexion</h1>

                    <!-- Ajout d'une zone pour afficher les messages d'erreur -->
                    <div
                        id="error-message"
                        style="color: red; display: none; margin-bottom: 15px"
                    ></div>

                    <form id="loginForm">
                        <label for="email">Email :</label>
                        <input type="email" id="email" name="email" required />

                        <label for="password">Mot de passe :</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                        />

                        <button type="submit">Se connecter</button>
                    </form>
                </div>
            </section>
        </main>

        <footer id="contact" class="footer">
            <div class="container">
                <p>Projet pedagogique - ETML 183</p>
            </div>
        </footer>

        <script src="/js/nav.js"></script>
        <script>
            document
                .getElementById("loginForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();

                    const email = document.getElementById("email").value;
                    const password = document.getElementById("password").value;
                    const errorDiv = document.getElementById("error-message");

                    try {
                        const response = await fetch("/api/auth/login", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({ email, password }),
                        });

                        const data = await response.json();

                        if (response.ok) {
                            localStorage.setItem(
                                "user",
                                JSON.stringify(data.user),
                            );

                            window.location.href = "/profile";
                        } else {
                            errorDiv.textContent =
                                data.error || "Erreur lors de la connexion";
                            errorDiv.style.display = "block";
                        }
                    } catch (error) {
                        console.error("Erreur:", error);
                        errorDiv.textContent =
                            "Erreur de connexion au serveur.";
                        errorDiv.style.display = "block";
                    }
                });
        </script>
    </body>
</html>
